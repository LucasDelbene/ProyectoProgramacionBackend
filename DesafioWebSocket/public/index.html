<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet"integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/estilos.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.7/handlebars.min.js"integrity="sha512-RNLkV3d+aLtfcpEyFG8jRbnWHxUqVZozacROI4J2F1sTaDqo1dPQYs01OMi1t1w9Y2FdbSCDSQ2ZVdAC8bzgAg=="crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <title>DESAFIO WEB SOCKET - PROGRAMACION BACKEND</title>
</head>
<body class="bg-dark">
    <header class="tituloPrincipal">
        <h1>DESAFIO WEBSOCKET - PROGRAMACION BACKEND</h1>
    </header>

    <main>
        <section class="container-fluid d-flex justify-content-around align-items-center products mt-4 border-light">
            <div class="w-25">
                <h5 class="tituloDatosProducto text-light text-center">INGRESE LOS DATOS DEL PRODUCTO</h5>
                
                <form id="newProduct" autocomplete="off">
                    <input type="text" autocomplete="false" name="hidden" style="display:none">
                    <div class="form-group">
                        <label for="id"><b class="text-light">ID</b></label>
                        <input  id="id" class="form-control bg-dark text-light" type="number" name="id" required>
                    </div>
                    <div class="form-group">
                        <label for="nombre"><b class="text-light">NOMBRE</b></label>
                        <input id="nombre" class="form-control bg-dark text-light" type="text" name="nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="precio"><b class="text-light">PRECIO</b></label>
                        <input id="precio" class="form-control bg-dark text-light" type="number" name="precio" required>
                    </div>

                    <div class="form-group">
                        <label for="imagen"><b class="text-light">IMAGEN URL</b></label>
                        <input id="imagen" class="form-control bg-dark text-light" type="text" name="imagen" required>
                    </div>
                    <div class="d-flex justify-content-center">
                        <button class="btn btn-outline-light mt-3 mb-5">ENVIAR</button>
                    </div>
                </form>
            </div>
            <div class="border" id="productos">
                
            </div>
        </section>

        <section class="seccionChat container-fluid d-flex messages h-50 border-light">
            <form class="formulario d-flex flex-column w-50" autocomplete="off" id="messageForm">
                <input type="text" autocomplete="false" name="hidden" style="display:none">
                <input class="bg-dark text-light border-light mb-4 rounded" type="email" name="email" id="email" placeholder="Ingrese su Correo Electronico" required>
                
                <aside class="mensajes border d-flex flex-column w-50">
                    <div class="d-flex flex-column" id="messageDisplay">
                    </div>
                </aside>

                <input class="bg-dark text-light border-light mt-4 rounded" type="text" placeholder="Envie un mensaje" name="text" id="text" required>
                <button class="btn btn-outline-light mt-4">ENVIAR</button>
            </form>  
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
